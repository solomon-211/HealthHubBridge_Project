<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CCMS</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<!-- Global Loading Spinner -->
<div id="global-spinner" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,0.7);z-index:9999;align-items:center;justify-content:center;">
  <span class="spinner spinner-dark" style="width:36px;height:36px;"></span>
</div>

<!-- Main Layout Container -->
<div class="layout">
  <!-- Header will be injected here by JavaScript -->
  <div id="header-slot"></div>
  
  <!-- Sidebar will be injected here by JavaScript -->
  <div id="sidebar-slot"></div>

  <!-- Main Content Area -->
  <main class="main">
    <!-- Page Header with Title and Actions -->
    <div class="page-header">
      <h1 class="page-title" id="dash-title">Dashboard</h1>
      <!-- Admin-only quick link to reports -->
      <div data-role="admin">
        <a href="../reports/index.html" class="btn btn-outline btn-sm">Reports</a>
      </div>
    </div>

    <!-- Statistics Cards Grid -->
    <div class="stats-grid" id="stats-grid">
      <!-- Total Patients Card -->
      <div class="stat-card">
        <div class="stat-card-value" id="stat-patients">—</div>
        <div class="stat-card-label">Total Patients</div>
      </div>
      
      <!-- Today's Appointments Card -->
      <div class="stat-card">
        <div class="stat-card-value" id="stat-appointments">—</div>
        <div class="stat-card-label">Today's Appointments</div>
      </div>
      
      <!-- Pending Payments Card (Admin & Receptionist only) -->
      <div class="stat-card" data-role="admin,receptionist">
        <div class="stat-card-value" id="stat-pending">—</div>
        <div class="stat-card-label">Pending Payments</div>
      </div>
      
      <!-- Today's Revenue Card (Admin only) -->
      <div class="stat-card" data-role="admin">
        <div class="stat-card-value" id="stat-revenue">—</div>
        <div class="stat-card-label">Today's Revenue</div>
      </div>
    </div>

    <!-- Two Column Layout for Appointments and Patients -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <!-- Today's Appointments Section -->
      <div class="card">
        <div class="card-title">Today's Appointments</div>
        <div id="today-appointments">
          <div class="empty-state">
            <div class="empty-state-text">Loading...</div>
          </div>
        </div>
        <div style="margin-top:12px">
          <a href="../appointments/index.html" class="btn btn-outline btn-sm" data-role="admin,receptionist">
            + New Appointment
          </a>
        </div>
      </div>

      <!-- Recent Patients Section -->
      <div class="card">
        <div class="card-title" id="right-panel-title">Recent Patients</div>
        <div id="recent-patients">
          <div class="empty-state">
            <div class="empty-state-text">Loading...</div>
          </div>
        </div>
        <div style="margin-top:12px">
          <a href="../patients/register.html" class="btn btn-primary btn-sm" data-role="admin,receptionist">
            + Register Patient
          </a>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../assets/js/utils.js"></script>
<script>
  // Initialize page security and session
  authGuard();
  checkSessionTimeout();

  // Inject header and sidebar into the page
  document.getElementById('header-slot').outerHTML = renderHeader();
  document.getElementById('sidebar-slot').outerHTML = renderSidebar('dashboard');
  
  // Apply role-based visibility to elements
  applyRoleVisibility();

  // Get user information from session
  const role = sessionStorage.getItem('role');
  const name = sessionStorage.getItem('name');
  
  // Personalize the dashboard title
  document.getElementById('dash-title').textContent = `Welcome, ${name}`;

  /**
   * Load dashboard statistics from the API
   * Displays total patients, appointments, pending payments, and revenue
   */
  async function loadStats() {
    try {
      const data = await apiFetch('/api/dashboard/stats');
      if (!data) return;

      // Update each stat card with data from API
      document.getElementById('stat-patients').textContent = data.total_patients ?? '—';
      document.getElementById('stat-appointments').textContent = data.today_appointments ?? '—';
      document.getElementById('stat-pending').textContent = data.unpaid_invoices 
        ? formatCurrency(data.pending_payments) 
        : '0 SSP';
      document.getElementById('stat-revenue').textContent = formatCurrency(data.today_revenue ?? 0);
    } catch (e) {
      // Fail silently - stats will show dashes
    }
  }

  /**
   * Load and display today's appointments
   * Shows appointment time, patient name, doctor, and status
   */
  async function loadTodayAppointments() {
    try {
      const data = await apiFetch('/api/appointments/today');
      const appointmentsList = data?.appointments ?? [];
      const element = document.getElementById('today-appointments');

      // Show empty state if no appointments
      if (appointmentsList.length === 0) {
        element.innerHTML = '<div class="empty-state"><div class="empty-state-text">No appointments today</div></div>';
        return;
      }

      // Build appointments table
      element.innerHTML = `
        <table style="width:100%">
          <thead>
            <tr>
              <th>Time</th>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${appointmentsList.map(appointment => `
              <tr>
                <td>${appointment.appointment_datetime?.split('T')[1]?.substring(0,5) ?? '—'}</td>
                <td>${appointment.patient_name ?? '—'}</td>
                <td>${appointment.doctor_name ?? '—'}</td>
                <td>${renderBadge(appointment.status)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    } catch (error) {
      // Show error state
      document.getElementById('today-appointments').innerHTML = 
        '<div class="empty-state"><div class="empty-state-text">Could not load appointments</div></div>';
    }
  }

  /**
   * Load and display the 5 most recent patients
   * Shows patient name and clinic number with view link
   */
  async function loadRecentPatients() {
    try {
      const data = await apiFetch('/api/patients');
      const patients = data?.patients ?? [];
      const recentPatients = patients.slice(-5).reverse();
      const element = document.getElementById('recent-patients');

      // Show empty state if no patients
      if (recentPatients.length === 0) {
        element.innerHTML = '<div class="empty-state"><div class="empty-state-text">No patients yet</div></div>';
        return;
      }

      // Build patient list
      element.innerHTML = recentPatients.map(patient => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-weight:500;font-size:13px;">${patient.first_name} ${patient.last_name}</div>
            <div style="font-size:11px;color:var(--text-muted);">${patient.clinic_number}</div>
          </div>
          <a href="../patients/profile.html?id=${patient.patient_id}" class="btn btn-outline btn-sm">View</a>
        </div>
      `).join('');
    } catch (error) {
      // Show error state
      document.getElementById('recent-patients').innerHTML = 
        '<div class="empty-state"><div class="empty-state-text">Could not load patients</div></div>';
    }
  }

  // Load all dashboard data
  loadStats();
  loadTodayAppointments();
  loadRecentPatients();
</script>

</body>
</html>
